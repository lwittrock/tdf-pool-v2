name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm install (not ci): the lockfile carries platform-specific optional
      # native/WASM deps (Tailwind v4-alpha) that differ between the dev machine
      # (win32) and this Linux runner, which makes strict `npm ci` fail on sync.
      - run: npm install --no-audit --no-fund
      - run: npm run check
      - run: npm test --if-present
